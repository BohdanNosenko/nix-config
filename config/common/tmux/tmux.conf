# ~/.tmux.conf

# Options to make tmux more pleasant
set -g mouse on
# set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "screen-256color"
set -g prefix C-s

# Increase scrollback buffer history from 2000 to 50000 lines
set -g history-limit 50000

bind r source-file ~/.tmux.conf

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Use Vim keybindings in copy mode
setw -g mode-keys vi

# ==========================================
# CATPPUCCIN THEME SETUP (v2.x)
# ==========================================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Crucial: Load Catppuccin v2 theme before modifying status-left/right variables
run ~/.tmux/plugins/tmux/catppuccin.tmux

# ==========================================
# STATUS LINE CONFIGURATION
# ==========================================
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# Your custom modules
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ==========================================
# PLUGINS (via TPM)
# ==========================================
# We must register the engines so TPM can download and load them!
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'     # Drives the CPU & RAM modules
set -g @plugin 'tmux-plugins/tmux-battery' # Drives the Battery module
set -g @plugin 'catppuccin/tmux'

# Auto-clone TPM if missing on a clean host
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (Must stay at the absolute bottom)
run '~/.tmux/plugins/tpm/tpm'
