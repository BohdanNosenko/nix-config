# ~/.tmux.conf - Shared Tmux Configuration

# Pleasant tmux defaults
set -g mouse on
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "screen-256color"
set -g prefix C-s

# Increase scrollback buffer history from 2000 to 50000 lines
set -g history-limit 50000

bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Use Vim keybindings in copy mode
setw -g mode-keys vi

# ==========================================
# CATPPUCCIN THEME SETUP
# ==========================================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Safe load Catppuccin v2 theme if file exists
if-shell '[ -f ~/.tmux/plugins/tmux/catppuccin.tmux ]' 'run ~/.tmux/plugins/tmux/catppuccin.tmux'
if-shell '[ -f ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux ]' 'run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux'

# ==========================================
# STATUS LINE CONFIGURATION
# ==========================================
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# Custom status modules
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# ==========================================
# PLUGINS (via TPM)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'

# Auto-clone TPM if missing on a clean host
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager
if-shell '[ -f ~/.tmux/plugins/tpm/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
